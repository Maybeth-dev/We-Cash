<div id="display" class="mt-3"></div>
<div class="container">
    <h2>Sign Up</h2>
      <input type="text" id="userName" placeholder="Enter your username" required>
      <input type="email" id="email" placeholder="Enter your email address" required> 
     <input type="date" id="dob" placeholder="Enter your date of birth" required>
         <input type="password" id="password" placeholder="Enter your password" required>

    </div>
    
    <div class="col-4 mx-auto p-2"><p>Already registered? <a class="fw-bold text-decoration-none text-primary" href="./signin.html">Sign In</a></p></div>
   
   
   
      <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
      import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

 
  const firebaseConfig = {
    apiKey: "AIzaSyDbcOiDEbh00C_inqFZbw2v-kAWwWC19Ws",
    authDomain: "wecash-a0756.firebaseapp.com",
    databaseURL: "https://wecash-a0756-default-rtdb.firebaseio.com",
    projectId: "wecash-a0756",
    storageBucket: "wecash-a0756.firebasestorage.app",
    messagingSenderId: "341614312585",
    appId: "1:341614312585:web:4b2fc6975d727eddf49a58",
    measurementId: "G-C700T0SBC9"
  };
 
 
      const app = initializeApp(firebaseConfig);
      const auth = getAuth();
      const provider = new GoogleAuthProvider();
      const database = getDatabase();
      // function submitForm() {
      //     // console.log("Form submitted");
      //   }
      // window.submitForm = function(){
      //   // console.log("I am now working")
      // }
      document.getElementById("submitForm").addEventListener("click", () => {
    let userName = document.getElementById("userName")?.value || "";  
    let email = document.getElementById("email").value;
    let dob = document.getElementById("dob")?.value || ""; 
    let password = document.getElementById("password").value;

    
    if (email === "" || password.length < 6) {
        alert("Please enter a valid email and a password with at least 6 characters.");
        return;
    }
    if (userName === "" || email === "" || dob === "" || password.length < 6) {
    alert("Please fill in all fields and ensure the password has at least 6 characters.");
    return;
}

    const userObject = {
        userName,
        email,
        dob,  
    };

    console.log(userObject);
    
    createUserWithEmailAndPassword(auth, email, password)
    .then((usersInfo) => {
        const users = usersInfo.user;
        const uid = users.uid;
        console.log(users);
        alert("User successfully registered");
        window.location.href= "./user-page.html";
        alert("Dear User you have been gifted 5000# as your initial balance ")
        
        const userRef = ref(database, `users/${uid}`); 
        set(userRef, userObject)  
        .then(() => {
            console.log("Database info stored");
            location.href = "./user-page.html";
        })
        .catch((error) => {
            console.log("There is an error: " + error);
                });
        })
        .catch((error) => {
            const errorCode = error.code;
            const errorMessage = error.message;
            console.log(errorCode);
            console.log(errorMessage);
            alert("User not registered: " + errorMessage);
        });
    });
    
    document.getElementById("googleAuth").addEventListener('click', ()=>{
        signInWithPopup(auth, provider)
        .then((result)=>{
            
          const data = result.user
          console.log(data)
          document.getElementById("display").innerHTML = `
          <h1>Welcome, ${data.displayName}</h1>
          <p>${data.email}</p>
          <img src="${data.photoURL}" alt="Display Image"/>
          
          `;
          location.href = "./user-page.html"
        })
        .catch((error)=>{
          console.log(error)
        })
        set(userRef, userObject)
    .then(() => {
        location.href = "./user-page.html";
    })
    .catch((error) => {
        console.error("Error storing user data:", error);
    });

      });     
    </script>
