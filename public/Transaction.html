<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make Transaction</title>
  <script src="./script.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      color: #333;
      margin: 0;
      padding: 0;
    }
    .content {
      max-width: 600px;
      background-color: #f9f9f9;
      margin: 0 auto;
      padding: 20px;
    }
    .background img {
      width: 100%;
      height: 150%;
      background-size: cover;
      position: absolute;
      z-index: -1;
      top: 0;
    }
    .Details {
      max-width: 600px;
    }
    h1 {
      text-align: center;
    }
    form {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="number"],
    input[type="date"],
    input[type="time"],
    select {
      width: 95%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #007bff;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background-color: #0056b3;
    } 

    #bankForm, #transactionHistory {
      display: none;
    }
    #accountDetails,
    #insufficientFundsMessage,
    #transactionDetails {
      background-color: #f1f1f1;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }
    #insufficientFundsMessage {
      color: red;
      font-weight: bolder;
    }
    #accountDetails h2,
    #transactionHistory h2,
    #transactionDetails h2 {
      margin-top: 0;
    }
    #accountDetails{
        position: relative;
        left: 65%;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    #transactionHistory li::before {
      content: "• ";
    } 

    .button-container {
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="background">
    <img src="./asset/Screenshot 2024-12-26 171820.png" alt="background">
  </div>

  <div class="row row-task mt-5">
    <div class="container content">
      <div class="col">
        <h1>Transactions</h1>
   
        <div class="button-container">
          <button id="makeTransactionBtn">Make Transaction</button>
          <button id="showHistoryBtn">Transaction History</button>
        </div>
 
        <form id="bankForm">
          <label for="name">Name:</label>
          <input type="text" id="name" required><br>
  
          <label for="accountNumber">Account Number:</label>
          <input type="text" id="accountNumber" required><br>
  
          <label for="transactionType">Transaction Type:</label>
          <select id="transactionType" required>
            <option value="deposit">Deposit</option>
            <option value="withdrawal">Withdrawal</option>
            <option value="expenses">Expenses</option>
          </select><br>
  
          <label for="amount">Amount:</label>
          <input type="number" id="amount" required><br>
  
          <button type="submit">Submit</button>
        </form>
      </div>
    </div>
    <div class="container Details">
      <div class="col">
    
        <div class="accountDetails" id="accountDetails">
          <h2>Account Details</h2>
          <p>Name: <span class="name"></span></p>
          <p>Account Number: <span class="accountNumber"></span></p>
          <p>Balance: <span class="balance"></span></p>
        </div>
   
        <div id="transactionHistory">
          <ul id="transactions"></ul>
        </div>
  
        <div id="insufficientFundsMessage">
          Insufficient Funds
        </div>
  
        <div   id="transactionDetails">
          <h2>Transaction Details</h2>
          <p>Name: <span class="name"></span></p>
          <p>Account Number: <span class="accountNumber"></span></p>
          <p>Type: <span class="type"></span></p>
          <p>Amount: <span class="amount"></span></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    
    document.getElementById("makeTransactionBtn").addEventListener("click", function() {
      document.getElementById("bankForm").style.display = "block";
      document.getElementById("transactionHistory").style.display = "none";
      document.getElementById("accountDetails").style.display = "none";
      document.getElementById("transactionDetails").style.display = "none";
      document.getElementById("insufficientFundsMessage").style.display = "none";
    });

    
    document.getElementById("showHistoryBtn").addEventListener("click", function() {
      document.getElementById("bankForm").style.display = "none";
      document.getElementById("transactionHistory").style.display = "block";
      document.getElementById("accountDetails").style.display = "block";
      document.getElementById("transactionDetails").style.display = "none";
      document.getElementById("insufficientFundsMessage").style.display = "none";
    });
  </script>
</body>
</html>
