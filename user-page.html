<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Page</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
          crossorigin="anonymous">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./userpg.css">
    
    <!-- JavaScript -->
    <script src="./userpg.js" defer></script>
</head>
<body>
    <div class="bg-success container-fluid p-3">
        <div class="row">
            <div class="col ps-5">
                <h1 class="text-light fs-3 fw-light">Welcome</h1>
            </div>
            <div class="col text-end pe-5">
                <button id="signOut" class="btn btn-outline-warning">Sign Out</button>
            </div>
        </div>
    </div>
    
    <div id="display" class="mx-auto col-7 border p-3 my-5 shadow">
        <div id="userBalance">
            <p>Your Account Details:</p>
            <p></p>
        </div>
    </div>
    
    <div class="text-center">
        <a href="./Transaction.html">
            <button id="makeTransaction" class="btn btn-success mx-2">Make a Transaction</button>
        </a>
        <button id="transactionHistory" class="btn btn-success mx-2">See Transaction History</button>
    </div>
    
    <script type="module">
        // Firebase Configuration 
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbcOiDEbh00C_inqFZbw2v-kAWwWC19Ws",
            authDomain: "wecash-a0756.firebaseapp.com",
            projectId: "wecash-a0756",
            storageBucket: "wecash-a0756.firebasestorage.app",
            messagingSenderId: "341614312585",
            appId: "1:341614312585:web:4b2fc6975d727eddf49a58",
            measurementId: "G-C700T0SBC9"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase();
        const auth = getAuth();


        // function generateAccountNumber() {
        //     return Math.floor(100000000 + Math.random() * 900000000);
        // }
        function signUp(email, password, userName, dob) {
    createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
            const user = userCredential.user;

            
            set(ref(database, `users/${user.uid}`), {
                userName: userName,
                Email: email,
                dob: dob,
                userBalance: 5000
            }).then(() => {
                console.log("User data saved!");
            }).catch((error) => {
                console.error("Error saving user data:", error);
            });

        }).catch((error) => {
            console.error("Error signing up:", error);
        });
}

  onAuthStateChanged(auth, (user) => {
        if (user) {
            const uid = user.uid; // Use Firebase UID instead of random number
            console.log(`User UID: ${uid}`);

            const userRef = ref(database, `users/${uid}`);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();

                if (data) {
                    console.log("User Data:", data);

                    document.getElementById("userBalance").innerHTML = `
                        <p><strong>Name:</strong> ${data.userName}</p>
                        <p><strong>Email:</strong> ${data.Email}</p>
                        <p><strong>Date of Birth:</strong> ${data.dob}</p>
                        <p><strong>User Balance:</strong> $${data.userBalance}</p>
                    `;
                } else {
                    console.log("No data found for this user.");
                    document.getElementById("userBalance").innerHTML = "<p>No account details available.</p>";
                }
            });
        } else {
            console.log("No user is signed in.");
            document.getElementById("userBalance").innerHTML = "<p>Please sign in to view your account details.</p>";
        }
    });

        document.getElementById("signOut").addEventListener("click", () => {
            signOut(auth).then(() => {
                location.href = "./signin.html";
            });
        });
    </script>
</body>
</html>
